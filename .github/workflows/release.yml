name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  CI: "true"

jobs:
  publish:
    name: publish
    runs-on: blacksmith-32vcpu-ubuntu-2404
    permissions:
      contents: read
      # OIDC token for npm trusted publishing — no npm secrets exist
      # anywhere in this repository.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Apply the tag version
        run: npm pkg set version="${GITHUB_REF_NAME#v}"

      - run: pnpm exec vp run check

      - run: pnpm exec vp run test:unit

      - run: pnpm exec vp run build

      - name: Publish via OIDC trusted publishing
        run: npm publish --access public
