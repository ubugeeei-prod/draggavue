name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: "true"

jobs:
  fmt:
    name: fmt
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm exec vp run check:fmt

  oxlint:
    name: oxlint
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm exec vp run check:oxlint

  vize-lint:
    name: vize-lint
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm exec vp run lint

  typecheck:
    name: typecheck
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm exec vp run typecheck

  unit:
    name: unit
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm exec vp run test:unit

  browser:
    name: browser
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec vp run test:browser

  vapor:
    name: vapor
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec vp run test:vapor

  build:
    name: build
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm exec vp run build

  size:
    name: size
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm exec vp run build
      - run: pnpm exec vp run size

  musea-preview:
    name: musea-preview
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    runs-on: blacksmith-32vcpu-ubuntu-2404
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm exec vp run musea:build

      # Real deploy when the Cloudflare secrets exist; the artifact
      # below stays as a fallback and an archived copy either way.
      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "url=" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets not configured — using the artifact fallback."
            exit 0
          fi
          pnpm dlx wrangler pages project create draggavue-musea \
            --production-branch main > /dev/null 2>&1 || true
          pnpm dlx wrangler pages deploy dist-musea \
            --project-name draggavue-musea --branch "pr-$PR" --commit-dirty=true
          echo "url=https://pr-$PR.draggavue-musea.pages.dev/__musea__/" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        id: gallery
        with:
          name: musea-preview
          path: dist-musea
          retention-days: 14

      - name: Pin the preview link on the PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
          ARTIFACT_URL: ${{ steps.gallery.outputs.artifact-url }}
        run: |
          marker="<!-- musea-preview -->"
          if [ -n "$DEPLOY_URL" ]; then
            body="$marker
          ### 🖼 Musea preview

          **[Open the gallery]($DEPLOY_URL)** — deployed for this PR, updated on every push.

          <sub>[Artifact copy]($ARTIFACT_URL) · or run \`vp run musea\` on the branch.</sub>"
          else
            body="$marker
          ### 🖼 Musea preview

          - [Download the static gallery]($ARTIFACT_URL), unzip, then \`npx serve .\` and open \`/__musea__/\`
          - Or run it live from this branch: \`vp run musea\`

          <sub>Set the \`CLOUDFLARE_API_TOKEN\` / \`CLOUDFLARE_ACCOUNT_ID\` repo secrets and this comment becomes a live URL.</sub>"
          fi
          existing=$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR/comments" --paginate \
            --jq "[.[] | select(.body | startswith(\"$marker\"))][0].id")
          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            gh api -X PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$existing" -f body="$body" > /dev/null
          else
            gh api "repos/$GITHUB_REPOSITORY/issues/$PR/comments" -f body="$body" > /dev/null
          fi

  pkg-pr-new:
    name: pkg-pr-new
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    # Best-effort until the pkg.pr.new GitHub App is installed on the
    # repository — never blocks automerge.
    continue-on-error: true
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm exec vp run build
      - name: Publish a continuous release
        run: pnpm dlx pkg-pr-new publish

  automerge:
    name: automerge
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    needs: [fmt, oxlint, vize-lint, typecheck, unit, browser, vapor, build, size]
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: write
      pull-requests: write
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        # The branch ruleset aggregates required-check states with a
        # small lag after the last job finishes, so the first attempt
        # can lose the race. Retry briefly instead of failing the run.
        run: |
          for attempt in 1 2 3 4 5; do
            if gh pr merge --squash --repo "$GITHUB_REPOSITORY" "$PR"; then
              exit 0
            fi
            echo "merge attempt $attempt refused — retrying in 15s"
            sleep 15
          done
          echo "giving up after 5 attempts"
          exit 1
