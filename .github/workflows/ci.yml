name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: "true"

jobs:
  fmt:
    name: fmt
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm exec vp run check:fmt

  oxlint:
    name: oxlint
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm exec vp run check:oxlint

  vize-lint:
    name: vize-lint
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm exec vp run lint

  typecheck:
    name: typecheck
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm exec vp run typecheck

  unit:
    name: unit
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm exec vp run test:unit

  browser:
    name: browser
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec vp run test:browser

  vapor:
    name: vapor
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec vp run test:vapor

  build:
    name: build
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm exec vp run build

  size:
    name: size
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm exec vp run build
      - run: pnpm exec vp run size

  musea-preview:
    name: musea-preview
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    runs-on: blacksmith-32vcpu-ubuntu-2404
    permissions:
      contents: write
      pull-requests: write
    # gh-pages pushes from parallel PRs must not race each other.
    concurrency:
      group: musea-pages
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Build against the Pages subdirectory
        env:
          DRAGGAVUE_MUSEA_BASE: /draggavue/pr-${{ github.event.pull_request.number }}/
        run: pnpm exec vp run musea:build

      - name: Publish to GitHub Pages
        env:
          PR: ${{ github.event.pull_request.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add -B gh-pages /tmp/pages origin/gh-pages
          rm -rf "/tmp/pages/pr-$PR"
          mkdir -p "/tmp/pages/pr-$PR"
          cp -R "dist-musea/draggavue/pr-$PR/." "/tmp/pages/pr-$PR/"
          touch /tmp/pages/.nojekyll
          cd /tmp/pages
          git add -A
          git commit -m "preview: pr-$PR @ ${GITHUB_SHA:0:8}" || echo "nothing to publish"
          git push origin gh-pages || { git pull --rebase origin gh-pages && git push origin gh-pages; }

      - name: Pin the preview link on the PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          marker="<!-- musea-preview -->"
          url="https://ubugeeei-prod.github.io/draggavue/pr-$PR/__musea__/"
          body="$marker
          ### 🖼 Musea preview

          **[Open the gallery]($url)** — deployed to GitHub Pages for this PR, refreshed on every push.

          <sub>The first deploy can take a minute to go live. Locally: \`vp run musea\`.</sub>"
          existing=$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR/comments" --paginate \
            --jq "[.[] | select(.body | startswith(\"$marker\"))][0].id")
          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            gh api -X PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$existing" -f body="$body" > /dev/null
          else
            gh api "repos/$GITHUB_REPOSITORY/issues/$PR/comments" -f body="$body" > /dev/null
          fi

  pkg-pr-new:
    name: pkg-pr-new
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    # Best-effort until the pkg.pr.new GitHub App is installed on the
    # repository — never blocks automerge.
    continue-on-error: true
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm exec vp run build
      - name: Publish a continuous release
        run: pnpm dlx pkg-pr-new publish

  # Merging with GITHUB_TOKEN never triggers push/closed workflows
  # (recursion guard), so everything that must follow a merge —
  # dropping this PR's preview and republishing the permanent
  # gallery from the new main — happens right here, not via events.
  automerge:
    name: automerge
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    needs: [fmt, oxlint, vize-lint, typecheck, unit, browser, vapor, build, size]
    runs-on: blacksmith-32vcpu-ubuntu-2404
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: musea-pages
    steps:
      - name: Merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        # The branch ruleset aggregates required-check states with a
        # small lag after the last job finishes, so the first attempt
        # can lose the race. Retry briefly instead of failing the run.
        run: |
          for attempt in 1 2 3 4 5; do
            if gh pr merge --squash --repo "$GITHUB_REPOSITORY" "$PR"; then
              exit 0
            fi
            echo "merge attempt $attempt refused — retrying in 15s"
            sleep 15
          done
          echo "giving up after 5 attempts"
          exit 1

      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: ./.github/actions/setup

      - name: Rebuild the permanent gallery from the new main
        env:
          DRAGGAVUE_MUSEA_BASE: /draggavue/
        run: pnpm exec vp run musea:build

      - name: Publish the root and drop this PR's preview
        env:
          PR: ${{ github.event.pull_request.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add -B gh-pages /tmp/pages origin/gh-pages
          cd /tmp/pages
          rm -rf "pr-$PR"
          find . -maxdepth 1 ! -name . ! -name .git ! -name .nojekyll ! -name 'pr-*' -exec rm -rf {} +
          cp -R "$GITHUB_WORKSPACE/dist-musea/draggavue/." .
          printf '<!doctype html>\n<meta http-equiv="refresh" content="0; url=/draggavue/__musea__/" />\n<title>draggavue</title>\n' > index.html
          # Musea is a history-router SPA: deep links (component pages)
          # have no static file. GitHub Pages serves 404.html for any
          # miss, so shipping the app shell there lets those URLs boot
          # the gallery and restore their route.
          cp __musea__/index.html 404.html
          touch .nojekyll
          git add -A
          git commit -m "musea: main after pr-$PR" || echo "nothing to publish"
          git push origin gh-pages || { git pull --rebase origin gh-pages && git push origin gh-pages; }
